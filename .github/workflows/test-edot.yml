# Test "packages/opentelemetry-node" (a.k.a. EDOT Browser).
name: test-edot

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'packages/opentelemetry-node/**'
      - '.github/workflows/test-edot.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/opentelemetry-node/**'
      - '.github/workflows/test-edot.yml'

      # Cancel jobs running for old commits on a PR. Allow concurrent runs on 'main'.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test-edot:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 20
    - name: Install dependencies
      run: npm ci
      working-directory: packages/opentelemetry-browser
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: packages/opentelemetry-browser
    - name: Run Unit tests
      run: npm run test:unit
      working-directory: packages/opentelemetry-browser
    - name: Run Smoke tests
      run: npm run test:smoke
      working-directory: packages/opentelemetry-browser
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: packages/opentelemetry-browser/playwright-report/
        retention-days: 30