<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A layout example with a side menu that hides on mobile, just like the Pure website.">
    <title>EDOT Browser Example</title>
    <link rel="stylesheet" href="./pure-min.css">
    <link rel="stylesheet" href="./styles.css">
    <script>
        // To be replaced by the .env data. DO NOT TOUCH
        globalThis.otelEnv = {};
    </script>
    <script>
        // Same pattern as https://www.elastic.co/docs/reference/apm/agents/rum-js/install-agent#_asynchronous_non_blocking_pattern
        ;(function(d, s, c) {
            var j = d.createElement(s),
                t = d.getElementsByTagName(s)[0]

            j.src = './assets/elastic-otel-browser.js'
            j.onload = function() {
                // Expose the EDOT so you can play with it in the console
                window.edotBrowser = startBrowserSdk(c);
                // We want page load traces. Reload after 1st export is done
                // in 5secs aprox
                // setTimeout(() => location.reload(), 9000);
                // Throw some exceptions before we reload
                setTimeout(() => {
                    const id = Math.floor(Math.random()*10)
                    throw new Error(`Custom error (${id})`);
                }, 2000);
            }
            t.parentNode.insertBefore(j, t)
        })(document, 'script',
        {
            logLevel: 'debug',
            serviceName: 'otel-browser-example-app',
            serviceVersion: '0.0.1',
            otlpEndpoint: otelEnv.otlpEndpoint || `${location.protocol}//${location.host}`,
            exportHeaders: otelEnv.exportHeaders || { foo: 'bar' },
        })
    </script>
</head>
<body>

    <div id="layout">
        <!-- Menu -->
        <div id="menu">
            <div class="pure-menu">
                <a class="pure-menu-heading" href="#company">Company</a>

                <ul class="pure-menu-list">
                    <li class="pure-menu-item pure-menu-selected">
                        <a href="#home" class="pure-menu-link">Home</a>
                    </li>
                    <li class="pure-menu-item">
                        <a href="#traces" class="pure-menu-link">Traces</a>
                    </li>
                    <li class="pure-menu-item">
                        <a href="#metrics" class="pure-menu-link">Metrics</a>
                    </li>
                    <li class="pure-menu-item">
                        <a href="#logs" class="pure-menu-link">Logs</a>
                    </li>
                </ul>
            </div>
        </div>

        <div id="main">
            <div class="header">
                <h1>EDOT Browser Examples</h1>
                <h2>Instrumentations in action</h2>
            </div>

            <div id="content" class="content">
            </div>
        </div>
    </div>

    <script>
        (function (window, document) {
            const routes = [
                '#home',
                '#traces',
                '#metrics',
                '#logs',
            ];

            function navigate(hash) {
                const target = document.getElementById('content');
                const route = hash.slice(1);
                import(`./components/${route}.js`)
                    .then((mod) => mod.Component(target));
            }

            function handleEvent(e) {
                const {target} = e;
                console.log(target.href);
                if (target.href) {
                    const currentUrl = window.location;
                    const targetUrl = new URL(target.href);
                    if (currentUrl.hash !== targetUrl.hash) {
                        navigate(targetUrl.hash);
                    }
                }
            }
            document.addEventListener('click', handleEvent);

            // 1st navigation, go to home if not detected
            if (routes.includes(location.hash)) {
                navigate(location.hash);
            } else if (!location.hash) {
                navigate('#home');
            } else {
                location.hash = '#home';
                navigate('#home');
            }

        }(this, this.document));
    </script>

</body>
</html>
