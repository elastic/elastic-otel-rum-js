<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Context Manager Test</title>
        <!-- EDOT_PLACEHOLDER (DO NOT REMOVE)-->
    </head>
    <body>
        <h1>Context Manager Test</h1>
        <!-- TODO: add buttons -->
            <button id="timeout">setTimeout</button>
            <button id="promise-ctor">Promise - constructor</button>
            <button id="promise-then-success">Promise - then success</button>
            <button id="promise-then-failure">Promise - then failure</button>
            <button id="promise-catch">Promise - catch</button>
            <button id="promise-finally">Promise - finally</button>
            <button id="fetch">Fetch</button>
            <button id="xhr-event">XHR with EventListener</button>
            <button id="xhr-prop">XHR with Property</button>
            <script>
                const tracerProvider = edotBrowser.providers.tracer;
                document.querySelector('#timeout').addEventListener('click', () => {
                    setTimeout(() => {
                        tracerProvider.getTracer('default').startSpan('timeout-child').end();
                    }, 1);
                });
                document.querySelector('#promise').addEventListener('click', () => {
                    new Promise((resolve) => {
                        tracerProvider.getTracer('default').startSpan('promise-ctor').end();
                        resolve();
                    });
                });
                document.querySelector('#promise-then-success').addEventListener('click', () => {
                    Promise.resolve().then(() => {
                        tracerProvider.getTracer('default').startSpan('promise-then-success').end();
                    });
                });
                document.querySelector('#promise-then-failure').addEventListener('click', () => {
                    Promise.resolve().then(() => {
                        tracerProvider.getTracer('default').startSpan('promise-then-failure').end();
                    });
                });
            </script>
    </body>
</html>
