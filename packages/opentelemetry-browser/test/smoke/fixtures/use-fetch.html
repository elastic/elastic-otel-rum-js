<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">

        <title>Fetch Instrumentation Test</title>
        <!-- EDOT_PLACEHOLDER (DO NOT REMOVE)-->
    </head>
    <body>
        <h1>Fetch Instrumentation Test</h1>
        <button id="same-origin">Fetch Same Origin</button>
        <button id="other-origin">Fetch Same Origin</button>
        <p id="status"></p>
        <script>
            const statusElem = document.getElementById('status');
            document.getElementById('same-origin').addEventListener('click', () => {
                statusElem.innerText = 'started';
                fetch('/api/method', { headers: { foo: 'bar' } })
                    .then(() => {
                        statusElem.innerText = 'finished';
                    });
            });
            document.getElementById('other-origin').addEventListener('click', () => {
                statusElem.innerText = 'started';
                fetch('http://www.example.com', { headers: { bar: 'baz' } })
                    .then(() => {
                        statusElem.innerText = 'finished';
                    });
            });
        </script>
    </body>
</html>
